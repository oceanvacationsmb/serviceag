<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Agreements</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
  <script src="Admin.js" defer></script>
</head>
<body>
  <div class="page">
    <div class="hero">
      <div>
        <h1>Admin Agreement Dashboard</h1>
        <p>Manage, preview, and sign agreements for property owners. Enter required details, review the PDF, and email directly to the owner.</p>
      </div>
      <span class="badge admin">Admin</span>
    </div>

    <!-- New Agreement Form -->
    <form id="newAgreementForm" class="card form-grid full">
      <label>Email (Owner)<input id="new_client_email" type="email" required></label>
      <label>PMC Percent<input id="new_pmc_percent" type="number" required></label>
      <label>Owner Cleaning Fee<input id="new_owner_cleaning_fee" type="number" required></label>
      <!-- Add more fields as needed -->
      <button class="primary" type="submit">Create Agreement</button>
      <span id="newAgreementStatus" class="status"></span>
    </form>
    <button id="reviewNewAgreementBtn" class="primary">Preview PDF</button>
    <input id="clientLinkDisplay" readonly placeholder="Client Link">
    <button id="copyClientLinkBtn" class="secondary">Copy Link</button>
    <button id="emailClientBtn" class="secondary">Email Owner</button>
    
    <!-- Modal for PDF Preview -->
    <div id="previewModal" class="modal hidden">
      <div class="modal-content viewer large">
        <iframe id="pdfPreviewFrameLarge"></iframe>
        <button id="closeModalBtn" class="secondary">Close</button>
      </div>
      <div id="modalBackdrop" class="modal-backdrop"></div>
    </div>

    <!-- Agreements List and Management -->
    <div class="layout">
      <aside>
        <button id="refreshBtn" class="secondary">Refresh</button>
        <div class="records" id="recordsList"></div>
      </aside>
      <section>
        <form id="adminForm" class="card form-grid hidden">
          <!-- Repeat all input fields for edit as in JS -->
          <!-- ... -->
          <canvas id="adminSignaturePad"></canvas>
          <button id="saveBtn" class="primary">Save</button>
          <button id="reviewLoadedAgreementBtn" class="secondary">Review</button>
          <button id="deleteBtn" class="danger">Delete</button>
          <button id="signDownloadBtn" class="primary">Sign & Download</button>
          <span id="adminStatus" class="status"></span>
        </form
